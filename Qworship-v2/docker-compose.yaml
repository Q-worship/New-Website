version: '3.8'

services:
  server:
    build:
      context: .
      dockerfile: apps/server/Dockerfile
    expose:
      - "5000"
    environment:
      - NODE_ENV=production
      - MONGODB_URI=${MONGODB_URI}
      - JWT_SECRET=${JWT_SECRET}
      - RESEND_API_KEY=${RESEND_API_KEY}
      - EMAIL_FROM=${EMAIL_FROM}
      - FRONTEND_URL=${FRONTEND_URL:-https://app.qworship.com}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - SESSION_SECRET=${SESSION_SECRET}
      - ELEVENLABS_API_KEY=${ELEVENLABS_API_KEY}
      - LT_API_KEY=${LT_API_KEY}
      - LT_BASE_URL=${LT_BASE_URL}
      - R2_ACCESS_KEY_ID=${R2_ACCESS_KEY_ID}
      - R2_SECRET_ACCESS_KEY=${R2_SECRET_ACCESS_KEY}
      - R2_ENDPOINT=${R2_ENDPOINT}
      - R2_BUCKET_NAME=${R2_BUCKET_NAME}
      - R2_PUBLIC_URL=${R2_PUBLIC_URL}
      - SLACK_WEBHOOK_URL=${SLACK_WEBHOOK_URL}
    restart: unless-stopped

  marketing:
    build:
      context: .
      dockerfile: apps/marketing/Dockerfile
    expose:
      - "80"
    restart: unless-stopped

  # v2 product SPA (internal only — reached via gateway)
  product:
    build:
      context: .
      dockerfile: apps/client/Dockerfile
      args:
        - VITE_API_URL=${VITE_API_URL:-/api}
        - VITE_WS_URL=${VITE_WS_URL:-wss://app.qworship.com}
    expose:
      - "80"
    depends_on:
      - server
    restart: unless-stopped

  # Public entry for app.qworship.com (Coolify domain target).
  # Runs gateway nginx so existing "client" domain mappings work without panel changes.
  client:
    build:
      context: .
      dockerfile: infra/gateway/Dockerfile
    ports:
      - "3000:80"
    environment:
      - CHAT_API_ORIGIN=${CHAT_API_ORIGIN:-https://new-website.vianneycm.workers.dev}
    depends_on:
      - server
      - marketing
      - product
    restart: unless-stopped
