# One-click deploy: connect this repo in Render → New Blueprint → point at this file.
# Service URL becomes https://qworship-auth-api.onrender.com (set AUTH_API_ORIGIN to that).
services:
  - type: web
    name: qworship-auth-api
    runtime: docker
    dockerfilePath: ./apps/server/Dockerfile.auth
    dockerContext: ./apps/server
    plan: free
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 5000
      - key: MONGODB_URI
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: RESEND_API_KEY
        sync: false
      - key: EMAIL_FROM
        value: Qworship <onboarding@resend.dev>
      - key: FRONTEND_URL
        value: https://app.qworship.com
