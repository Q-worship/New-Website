name: Deploy chat API worker

on:
  push:
    branches: [main]
    paths:
      - 'workers/whatsapp-chat/**'
      - 'src/lib/faqPool.ts'
      - 'src/lib/chatbotMatcher.ts'
      - '.github/workflows/deploy-chat-api.yml'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    name: Deploy qworship-whatsapp-chat
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Deploy worker
        run: npm run deploy:chat-api
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
