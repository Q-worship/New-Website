name: Unblock site deploy (10143)

on:
  workflow_dispatch:

jobs:
  unblock:
    runs-on: ubuntu-latest
    name: Update CF deploy command and deploy site
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build site assets
        run: npm run build

      - name: Update Cloudflare deploy command
        continue-on-error: true
        run: node scripts/cf-update-deploy-command.mjs
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CF_DEPLOY_COMMAND: npm run deploy:production
          CF_TRIGGER_BUILD: 'false'

      - name: Deploy chat worker and site
        run: npm run deploy:chat-api && wrangler deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Verify site is live
        run: |
          curl -sf https://new-website.vianneycm.workers.dev/ | head -c 200 | grep -qi doctype
          curl -sf https://new-website.vianneycm.workers.dev/api/chat/health
